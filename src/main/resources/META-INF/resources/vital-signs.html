<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vital Signs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        select {
            padding: 8px;
            font-size: 14px;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            vertical-align: top;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .sub-table {
            width: 100%;
            border-collapse: collapse;
        }

        .sub-table td {
            border: none;
            padding: 2px 4px;
            font-size: 12px;
        }

        .sub-table td:first-child {
            width: 90px;
            white-space: nowrap;
            font-weight: bold;
            color: #666;
        }

        .sub-table td:last-child {
            word-break: break-all;
        }

        .series-table {
            border-collapse: collapse;
            width: 100%;
        }

        .series-table td {
            border: 1px solid #ddd;
            padding: 4px;
            font-size: 12px;
            text-align: center;
        }

        .series-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        canvas {
            width: 100%;
            height: 60px;
        }
    </style>
</head>
<body>

<h2>Vital Signs</h2>

<label>Patient:</label>
<select id="patientId" onchange="loadData()">
    <option value="1" selected>1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
</select>

<table id="resultTable">
    <thead>
    <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Code</th>
        <th>Value</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    function formatDate(dateString) {
        return new Date(dateString).toLocaleString("de-DE");
    }

    function parseCode(codeStr) {
        const match = codeStr.match(/system=(.*?), code=(.*?), display=(.*)\)/);
        if (!match) return codeStr;

        return `
        <table class="sub-table">
            <tr><td>System:</td><td>${match[1]}</td></tr>
            <tr><td>Code:</td><td>${match[2]}</td></tr>
            <tr><td>Display:</td><td>${match[3]}</td></tr>
        </table>
    `;
    }

    function extractValue(valueStr) {
        const match = valueStr.match(/value=([^,]+)/);
        return match ? match[1] : valueStr;
    }

    function parseValue(valueStr) {
        const match = valueStr.match(/\((.*?)\)/);
        if (!match) return valueStr;

        const parts = match[1].split(", ").map(p => p.split("="));

        return `
        <table class="sub-table">
            ${parts.map(p => `<tr><td>${p[0]}:</td><td>${p[1]}</td></tr>`).join("")}
        </table>
    `;
    }

    function drawChart(canvasId, values) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        const ctx = canvas.getContext("2d");

        const width = canvas.width = canvas.offsetWidth;
        const height = canvas.height = 60;

        const padding = 5;

        const min = Math.min(...values);
        const max = Math.max(...values);
        const range = max - min || 1;

        const stepX = width / (values.length - 1);

        ctx.clearRect(0, 0, width, height);

        ctx.beginPath();
        ctx.lineWidth = 2;

        values.forEach((v, i) => {
            const x = i * stepX;
            const y = height - padding - ((v - min) / range) * (height - 2 * padding);

            if (i === 0) {
                ctx.moveTo(x, y);
            } else {
                ctx.lineTo(x, y);
            }
        });

        ctx.stroke();

        // draw points
        values.forEach((v, i) => {
            const x = i * stepX;
            const y = height - padding - ((v - min) / range) * (height - 2 * padding);

            ctx.beginPath();
            ctx.arc(x, y, 2, 0, 2 * Math.PI);
            ctx.fill();
        });
    }

    function renderSeries(details) {
        const values = details.map(d => parseFloat(extractValue(d.valueQuantity)));
        const id = "chart-" + Math.random().toString(36).substring(2, 9);

        const valuesHtml = `
        <table class="series-table">
            <tr>
                ${values.map(v => `<td>${v}</td>`).join("")}
            </tr>
        </table>
    `;

        const canvasHtml = `<canvas id="${id}"></canvas>`;

        setTimeout(() => drawChart(id, values), 0);

        return `
        <div class="series-container">
            ${valuesHtml}
            ${canvasHtml}
        </div>
    `;
    }

    async function loadData() {
        const patientId = document.getElementById("patientId").value;

        const response = await fetch(`/vital-sign/byPatientId?patientId=${patientId}`);
        const data = await response.json();

        const tbody = document.querySelector("#resultTable tbody");
        tbody.innerHTML = "";

        data.forEach(vital => {
            const isSeries = vital.vitalSignDetails.length > 1 &&
                vital.vitalSignDetails[0].type === "BLOOD_PRESSURE_SERIES";

            if (isSeries) {
                const row = document.createElement("tr");

                row.innerHTML = `
                <td>${formatDate(vital.effectiveDateTime)}</td>
                <td>BLOOD_PRESSURE_SERIES</td>
                <td>${parseCode(vital.vitalSignDetails[0].code)}</td>
                <td>${renderSeries(vital.vitalSignDetails)}</td>
            `;

                tbody.appendChild(row);
            } else {
                vital.vitalSignDetails.forEach(detail => {
                    const row = document.createElement("tr");

                    row.innerHTML = `
                    <td>${formatDate(detail.effectiveDateTime)}</td>
                    <td>${detail.type}</td>
                    <td>${parseCode(detail.code)}</td>
                    <td>${parseValue(detail.valueQuantity)}</td>
                `;

                    tbody.appendChild(row);
                });
            }
        });
    }

    window.onload = loadData;
</script>

</body>
</html>
