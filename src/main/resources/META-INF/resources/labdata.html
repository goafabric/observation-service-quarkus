<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Laboratory Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        select {
            padding: 8px;
            font-size: 14px;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            vertical-align: top;
            text-align: left; /* ✅ force left alignment */
        }

        th {
            background-color: #f4f4f4;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .sub-table {
            width: 100%;
            border-collapse: collapse;
        }

        .sub-table td {
            border: none;
            padding: 2px 4px;
            font-size: 12px;
        }

        /* ✅ fixed label column for alignment */
        .sub-table td:first-child {
            width: 90px;
            white-space: nowrap;
            font-weight: bold;
            color: #666;
        }

        /* ✅ prevent long values (like URLs) from breaking layout */
        .sub-table td:last-child {
            word-break: break-all;
        }
    </style>
</head>
<body>

<h2>Laboratory Data</h2>

<label>Patient:</label>
<select id="patientId" onchange="loadData()">
    <option value="1" selected>1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
</select>

<table id="resultTable">
    <thead>
    <tr>
        <th>Date</th>
        <th>Code</th>
        <th>Value</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleString("de-DE"); // 🇩🇪 European format
    }

    function parseCode(coding) {
        return `
        <table class="sub-table">
            <tr><td>System:</td><td>${coding.system}</td></tr>
            <tr><td>Code:</td><td>${coding.code}</td></tr>
            <tr><td>Display:</td><td>${coding.display}</td></tr>
        </table>
    `;
    }

    function parseValue(vq) {
        return `
        <table class="sub-table">
            <tr><td>value:</td><td>${vq.value}</td></tr>
            <tr><td>unit:</td><td>${vq.unit}</td></tr>
            <tr><td>code:</td><td>${vq.code}</td></tr>
            <tr><td>system:</td><td>${vq.system}</td></tr>
        </table>
    `;
    }

    async function loadData() {
        const patientId = document.getElementById("patientId").value;

        const response = await fetch(`/laboratory-data/byPatientId?patientId=${patientId}`);
        const data = await response.json();

        const tbody = document.querySelector("#resultTable tbody");
        tbody.innerHTML = "";

        data.forEach(lab => {
            lab.observations.forEach(detail => {
                const row = document.createElement("tr");

                row.innerHTML = `
                <td>${formatDate(detail.effectiveDateTime)}</td>
                <td>${parseCode(detail.code)}</td>
                <td>${parseValue(detail.valueQuantity)}</td>
            `;

                tbody.appendChild(row);
            });
        });
    }

    // auto-load patient 1 on startup
    window.onload = loadData;
</script>

</body>
</html>
